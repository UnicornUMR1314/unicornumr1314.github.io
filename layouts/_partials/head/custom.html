<script>
(function(){
  try {
    var ls = window.localStorage;
    if (ls) {
      var keys = Object.keys(ls);
      for (var i = 0; i < keys.length; i++) {
        var k = keys[i];
        var v = ls.getItem(k);
        if (!v) continue;
        var kl = k.toLowerCase();
        var vl = String(v).toLowerCase();
        if (/lang|language|locale|i18n/.test(kl)) {
          if (vl.indexOf('en') === 0) {
            ls.removeItem(k);
          }
        }
      }
    }

    var path = location.pathname || '/';
    var direct = document.referrer === '' || document.referrer.indexOf(location.origin) === 0;
    if (path === '/' || path === '') {
      document.documentElement.setAttribute('lang','zh-CN');
    }
    if (path.indexOf('/zh-cn/') === 0) {
      var np = path.replace(/^\/zh-cn/, '') || '/';
      location.replace(np + (location.search || '') + (location.hash || ''));
      return;
    }
    if (path.indexOf('/en/') === 0 && direct) {
      location.replace('/');
    }
    window.DOIT_DISABLE_LANG_REDIRECT = true;
  } catch (e) {}
})();
</script>
